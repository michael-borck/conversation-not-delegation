project:
  type: book
  output-dir: _book
  resources:
    - tools/**

book:
  title: "Conversation, Not Delegation"
  subtitle: "How to Think With AI, Not Just Use It"
  author: "Michael Borck"
  date: today
  license: "CC BY"
  cover-image: cover.png
  favicon: favicon.svg
  chapters:
    - index.qmd
    - part: "Part 1: Understanding the Landscape"
      chapters:
        - chapters/what-is-ai.qmd
        - chapters/what-are-llms.qmd
        - chapters/the-delegation-trap.qmd
        - chapters/does-ai-make-us-dumber.qmd
    - part: "Part 2: Principles"
      chapters:
        - chapters/the-conversation-loop.qmd
        - chapters/ai-last.qmd
        - chapters/staying-critical.qmd
    - part: "Part 3: The Methodology"
      chapters:
        - chapters/rtcf.qmd
        - chapters/prompt-chaining.qmd
        - chapters/seven-techniques.qmd
        - chapters/using-ai-to-help-you-use-ai.qmd
        - chapters/vet-your-ai.qmd
    - part: "Part 4: Putting It Together"
      chapters:
        - chapters/conversations-across-disciplines.qmd
        - chapters/becoming-more-capable.qmd
  appendices:
    - appendices/a-craft-framework.qmd
    - appendices/b-quick-reference.qmd
    - appendices/c-further-reading.qmd
    - appendices/d-interactive-tools.qmd
    - about-author.qmd
  other-links:
    - text: Download PDF
      icon: file-pdf
      href: conversation-not-delegation.pdf
    - text: Download EPUB
      icon: book
      href: conversation-not-delegation.epub
    - text: Download llm.txt
      icon: robot
      href: llm.txt
    - text: GitHub
      icon: github
      href: https://github.com/michael-borck/conversation-not-delegation
    - text: DeepWiki
      icon: search
      href: https://deepwiki.com/michael-borck/conversation-not-delegation
    - text: All Books
      icon: collection
      href: https://books.borck.education
    - text: RTCF Prompt Builder
      icon: pencil-square
      href: tools/prompt-builder.html
    - text: RTCF Prompt Analyser
      icon: clipboard-check
      href: tools/rtcf-analyser.html
    - text: AI Readiness Quiz
      icon: question-circle
      href: tools/ai-readiness-quiz.html
    - text: Amazon
      icon: cart
      href: https://www.amazon.com.au/dp/B0GTF9F4Q2

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    include-after-body: chatbot.html
    toc: true
    toc-depth: 3
    number-sections: true
    mermaid-format: js
